<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard NoSQL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gestor de Usuarios</h1>
        
        <div class="card" id="registro-usuario">
            <h2>Registrar Nuevo</h2>
            <input type="text" id="nombre" placeholder="Nombre completo">
            <select id="rol">
                <option value="Estudiante">Estudiante</option>
                <option value="Docente">Docente</option>
                <option value="Administrador">Administrador</option>
            </select>
            <button id="btn-guardar">Guardar</button>
        </div>

        <div class="card">
            <h3>Buscar en la Base de Datos</h3>
            <input type="text" id="input-buscar" placeholder="Nombre...">
            <button id="btn-buscar">Buscar</button>
            <button id="btn-accion">Cargar Todos</button>
        </div>

        <div id="contenedor-datos"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
